name: Run Test Suite

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]

permissions:
    contents: read

jobs:
    run_tests:
        runs-on: ubuntu-latest
        environment:
            name: Testing
            deployment: false

        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.2

            - name: Setup Node.js environment
              uses: actions/setup-node@v6.3.0
              with:
                  node-version: 24

            - name: Install Dependencies
              run: npm ci

            - name: Run Linter
              run: npm run lint

            - name: Run Test Suite
              run: npm run test:ci
            
            - name: Upload a Build Artifact
              uses: actions/upload-artifact@v7.0.1
              with:
                name: Test Result
                path: testreport.json
