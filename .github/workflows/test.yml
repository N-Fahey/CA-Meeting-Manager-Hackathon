name: Run Test Suite

on:
    workflow_dispatch:

permissions:
    contents: read

jobs:
    run_tests:
        runs-on: ubuntu-latest
        environment:
            name: Testing
            deployment: false
        
        steps:
            - name: Checkout
              uses: actions/checkout@v6.0.2
            
            - name: Setup Node.js environment
              uses: actions/setup-node@v6.3.0
              with:
                node-version: 24
            
            - name: Setup NPM
              run: npm ci
            
            - name: Lint
              run: npm run lint
            
            - name: Run Test Suite
              run: npm run test:ci
