name: Configure AWS Services

on:
    workflow_dispatch:

permissions:
    id-token: write
    contents: read

jobs:
    validate_services:
        runs-on: ubuntu-latest
        environment:
            name: Production
            deployment: false
        defaults:
            run:
                working-directory: ./tf_aws/

        steps:
            - name: HashiCorp - Setup Terraform
              uses: hashicorp/setup-terraform@v4.0.0

            - name: Configure AWS Credentials
              uses: aws-actions/configure-aws-credentials@v6.1.0
              with:
                  role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
                  aws-region: ${{ vars.AWS_REGION }}

            - name: Checkout
              uses: actions/checkout@v6.0.2

            - name: Initialise Terraform
              id: init
              run: terraform init -backend-config="bucket=${{ vars.BUCKET_TF_STATE }}" -backend-config="key=${{ vars.BUCKET_TF_KEY }}" -backend-config="region=${{ vars.AWS_REGION }}"

            - name: Terraform Format
              run: terraform fmt -check

            - name: Terraform Validate
              run: terraform validate
